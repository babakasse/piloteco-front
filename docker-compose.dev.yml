# Docker development environment
version: '3.7'

services:
  piloteco-frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: piloteco-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      - /app/node_modules
    environment:
      # Backend PHP sur l'hôte (port 80)
      - VITE_APP_API_URL=${VITE_APP_API_URL:-http://localhost}
      - VITE_APP_BASE_NAME=${VITE_APP_BASE_NAME:-}
      - VITE_APP_VERSION=${VITE_APP_VERSION:-v9.2.0}
      - CHOKIDAR_USEPOLLING=true
    extra_hosts:
      # Permet d'accéder au backend PHP qui tourne sur l'hôte
      - "host.docker.internal:host-gateway"
    networks:
      - piloteco-dev-network
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  piloteco-dev-network:
    driver: bridge
